name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: 1
      # Placeholder values so module-load env validation passes in CI.
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/hard_stack
      BETTER_AUTH_SECRET: ci-secret-ci-secret-ci-secret-ci
      BETTER_AUTH_URL: http://localhost:3000
      RESEND_API_KEY: re_ci_placeholder
      EMAIL_FROM: ci@example.com
      WEB_URL: http://localhost:5173
      VITE_SERVER_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
